baseURL: "https://user8595.github.io/"
languageCode: en-us
title: user859
theme: PaperMod
copyright: "© [user8595](https://github.com/user8595)"

# change image cache folder location
caches:
  images:
    dir: :cacheDir/images

pagination:
  pagerSize: 5

params:
  title: user859
  description: "A digital space for my thoughts or maybe a journal."
  keywords: [Blog, Tech, Design, Writing]
  author: user8595
  DateFormat: "Jan 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowPageNums: true
  ShowShareButtons: true
  ShareButtons: ["linkedin", "twitter", "reddit", "facebook"]
  ShowRssButtonInSectionTermList: true
  comments: true

  params:
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    disableHLJS: true

  label:
    text: "user859"
    iconHeight: 35

  homeInfoParams:
    Title: "Hello there."
    Content: I hope you find my content intresting.

  socialIcons:
    - name: x
      url: "https://x.com/takoislongboi"
    - name: github
      url: "https://github.com/user8595"

  editPost:
    URL: "https://github.com/user8595/user8595.github.io/tree/master/content/"
    Text: "Suggest Changes"
    appendFilePath: true

markup:
  highlight:
    style: catppuccin-mocha
    lineNos: true
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: Tags
      url: tags/
      weight: 2
    - name: Search
      url: search/
      weight: 5
    - name: About
      url: about/
      weight: 10
